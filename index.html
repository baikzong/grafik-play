<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>grafik:play</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap');

  :root {
    --green: #7dc31a;
    --blue: #4ab8e0;
    --gray: #999;
    --light: #f0f0f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: #fff;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center;
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  .screen.hidden {
    opacity: 0; pointer-events: none;
    transform: translateY(20px);
  }

  /* ── INTRO ── */
  #intro {
    justify-content: space-between;
    padding: 60px 40px 60px;
  }

  .intro-logo {
    height: 32px; width: auto;
  }

  .intro-text {
    text-align: center;
    display: flex; flex-direction: column;
    align-items: center; gap: 6px;
  }

  .intro-en {
    font-size: 18px; font-weight: 800;
    color: var(--green); letter-spacing: -0.3px;
  }

  .intro-kr {
    font-size: 12px; font-weight: 400;
    color: var(--gray);
  }

  .intro-arrow {
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.2s;
  }

  .intro-arrow:active { opacity: 1; }

  .intro-arrow svg {
    width: 28px; height: 28px;
    stroke: var(--green); stroke-width: 2;
    fill: none;
  }

  /* ── MAIN ── */
  #main {
    justify-content: flex-start;
    padding: 0;
  }

  .main-logo-bar {
    width: 100%;
    display: flex; align-items: center; justify-content: center;
    padding: 20px 0 10px;
    flex-shrink: 0;
  }

  .main-logo { height: 26px; width: auto; }

  /* SECTIONS */
  .sections {
    flex: 1;
    width: 100%;
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .section {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  .section:first-child {
    border-bottom: 1px solid var(--light);
  }

  /* SWIPER */
  .swiper {
    flex: 1;
    position: relative;
    overflow: hidden;
    cursor: grab;
  }

  .swiper:active { cursor: grabbing; }

  .slides {
    display: flex;
    height: 100%;
    transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .slide {
    min-width: 100%;
    height: 100%;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }

  .slide img {
    width: 85%;
    max-height: 85%;
    object-fit: contain;
  }

  .slide-label {
    position: absolute;
    bottom: 12px; right: 16px;
    font-size: 11px; font-weight: 700;
    color: #333; letter-spacing: 0.3px;
  }

  .slide-label span {
    color: var(--green);
  }

  /* PLAYER BAR */
  .player-bar {
    flex-shrink: 0;
    height: 56px;
    padding: 0 12px;
    display: flex; align-items: center;
    border-top: 1px solid var(--light);
    background: #fff;
    gap: 8px;
  }

  .player-bar iframe {
    flex: 1;
    height: 44px;
    border: none;
    border-radius: 4px;
  }

  /* SHOP BAR */
  .shop-bar {
    flex-shrink: 0;
    height: 56px;
    display: flex; align-items: center; justify-content: center;
    border-top: 1px solid var(--light);
    cursor: pointer;
  }

  .shop-bar span {
    font-size: 20px; font-weight: 800;
    color: var(--green); letter-spacing: 1px;
  }

  /* DOTS */
  .dots {
    position: absolute;
    bottom: 60px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 5px;
    pointer-events: none;
  }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--light);
    transition: background 0.3s;
  }

  .dot.active { background: var(--green); }
</style>
</head>

<script>
// ── DATA ──
const BOLD_TRACKS = [
  { glasses: 'tony.w', sc: 'https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/zongbaik/relic&color=%237dc31a&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false' },
  { glasses: 'herb',   sc: 'https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/zongbaik/relic&color=%237dc31a&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false' },
];

const AIR_TRACKS = [
  { glasses: 'david.l', sc: 'https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/zongbaik/dull&color=%237dc31a&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false' },
  { glasses: 'paul',    sc: 'https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/zongbaik/dull&color=%237dc31a&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false' },
  { glasses: 'zola',    sc: 'https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/zongbaik/dull&color=%237dc31a&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false' },
];

// ── INTRO ──
function goMain() {
  // Check if first visit
  const visited = localStorage.getItem('gp_visited');
  document.getElementById('intro').classList.add('hidden');
  document.getElementById('main').classList.remove('hidden');
  if (!visited) localStorage.setItem('gp_visited', '1');
  initDots();
}

// Skip intro if returning visitor
window.addEventListener('load', () => {
  if (localStorage.getItem('gp_visited')) {
    document.getElementById('intro').classList.add('hidden');
    document.getElementById('main').classList.remove('hidden');
    initDots();
  }
});

// ── DOTS ──
function initDots() {
  makeDots('boldDots', BOLD_TRACKS.length, 0);
  makeDots('airDots', AIR_TRACKS.length, 0);
}

function makeDots(id, count, active) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === active ? ' active' : '');
    el.appendChild(d);
  }
}

function updateDots(id, active) {
  const dots = document.getElementById(id).querySelectorAll('.dot');
  dots.forEach((d, i) => d.classList.toggle('active', i === active));
}

// ── SWIPER ──
function makeSwiper(swiperId, slidesId, tracks, embedId, dotsId, otherEmbedId) {
  const swiper = document.getElementById(swiperId);
  const slidesEl = document.getElementById(slidesId);
  let current = 0;
  let startX = 0;
  let isDragging = false;

  function goTo(idx) {
    if (idx < 0 || idx >= tracks.length) return;
    current = idx;
    slidesEl.style.transform = `translateX(-${current * 100}%)`;
    updateDots(dotsId, current);
    // Update embed src for current track
    document.getElementById(embedId).src = tracks[current].sc;
    // Stop other section
    document.getElementById(otherEmbedId).src = '';
  }

  swiper.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
    isDragging = true;
  }, { passive: true });

  swiper.addEventListener('touchend', e => {
    if (!isDragging) return;
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) {
      if (diff > 0) goTo(current + 1);
      else goTo(current - 1);
    }
    isDragging = false;
  });

  // Mouse support
  swiper.addEventListener('mousedown', e => { startX = e.clientX; isDragging = true; });
  swiper.addEventListener('mouseup', e => {
    if (!isDragging) return;
    const diff = startX - e.clientX;
    if (Math.abs(diff) > 40) {
      if (diff > 0) goTo(current + 1);
      else goTo(current - 1);
    }
    isDragging = false;
  });

  // Init first embed
  document.getElementById(embedId).src = tracks[0].sc;
}

// Init both swipers after main is shown
function initSwipers() {
  makeSwiper('boldSwiper', 'boldSlides', BOLD_TRACKS, 'boldEmbed', 'boldDots', 'airEmbed');
  makeSwiper('airSwiper',  'airSlides',  AIR_TRACKS,  'airEmbed',  'airDots',  'boldEmbed');
}

document.getElementById('intro').querySelector('.intro-arrow').addEventListener('click', () => {
  setTimeout(initSwipers, 100);
});

window.addEventListener('load', () => {
  if (localStorage.getItem('gp_visited')) {
    setTimeout(initSwipers, 100);
  }
});
</script>
